{{ define "main" }}

<h1>{{ .Title }}</h1>

<div id="stats-loading">Loading stats...</div>

<div id="stats" class="d-none">
  <div class="row g-3 mb-4" id="summary"></div>

  <div class="mb-3">
    <div class="btn-group" role="group" aria-label="Stats period">
      <input type="radio" class="btn-check" name="period" id="period-daily" value="daily" checked>
      <label class="btn btn-outline-primary" for="period-daily">day</label>
      <input type="radio" class="btn-check" name="period" id="period-weekly" value="weekly">
      <label class="btn btn-outline-primary" for="period-weekly">week</label>
      <input type="radio" class="btn-check" name="period" id="period-monthly" value="monthly">
      <label class="btn btn-outline-primary" for="period-monthly">month</label>
    </div>
  </div>

  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <div class="btn-group" role="group" aria-label="Stats range">
      <input type="radio" class="btn-check" name="range" id="range-12m" value="12" checked>
      <label class="btn btn-outline-primary" for="range-12m">12 months</label>
      <input type="radio" class="btn-check" name="range" id="range-6m" value="6">
      <label class="btn btn-outline-primary" for="range-6m">6 months</label>
      <input type="radio" class="btn-check" name="range" id="range-3m" value="3">
      <label class="btn btn-outline-primary" for="range-3m">3 months</label>
      <input type="radio" class="btn-check" name="range" id="range-all" value="all">
      <label class="btn btn-outline-primary" for="range-all">all</label>
      <input type="radio" class="btn-check" name="range" id="range-custom" value="custom">
      <label class="btn btn-outline-primary" for="range-custom">custom</label>
    </div>
    <input type="date" class="form-control form-control-sm w-auto" id="range-start" disabled>
    <input type="date" class="form-control form-control-sm w-auto" id="range-end" disabled>
  </div>

  <div class="row g-4">
    <div class="col-12">
      <canvas id="runs-chart" height="120"></canvas>
    </div>
    <div class="col-12">
      <canvas id="tasks-chart" height="120"></canvas>
    </div>
    <div class="col-12">
      <canvas id="queue-median-chart" height="120"></canvas>
    </div>
    <div class="col-12">
      <canvas id="queue-p90-chart" height="120"></canvas>
    </div>
    <div class="col-12">
      <canvas id="queue-p99-chart" height="120"></canvas>
    </div>
    <div class="col-12">
      <canvas id="outcome-chart" height="120"></canvas>
    </div>
    <div class="col-12">
      <canvas id="wasted-chart" height="120"></canvas>
    </div>
  </div>

  <div class="row g-4 mt-2">
    <div class="col-lg-6">
      <h2>Top jobs by task count</h2>
      <div id="top-jobs"></div>
    </div>
    <div class="col-lg-6">
      <h2>Top jobs by failures</h2>
      <div id="failed-jobs"></div>
    </div>
    <div class="col-lg-6">
      <h2>Slowest jobs</h2>
      <div id="slowest-jobs"></div>
    </div>
    <div class="col-lg-6">
      <h2>Top branches</h2>
      <div id="top-branches"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const seconds = new Intl.NumberFormat();
  const percent = new Intl.NumberFormat(undefined, {
    maximumFractionDigits: 1,
  });

  function formatDuration(value) {
    const hours = Math.floor(value / 3600);
    const minutes = Math.floor((value % 3600) / 60);
    const secs = value % 60;
    if (hours > 0) {
      return `${hours}h ${minutes}m`;
    }
    if (minutes > 0) {
      return `${minutes}m ${secs}s`;
    }
    return `${secs}s`;
  }

  function formatHours(value) {
    return `${percent.format(value / 3600)}h`;
  }

  function formatMultiple(value) {
    return `${percent.format(value)}x`;
  }

  function outcomeRate(row, key) {
    return row.tasks === 0 ? 0 : row[key] * 100 / row.tasks;
  }

  function dateInputValue(date) {
    return date.toISOString().slice(0, 10);
  }

  function subtractMonths(date, months) {
    const copy = new Date(date);
    copy.setUTCMonth(copy.getUTCMonth() - months);
    return copy;
  }

  function summaryCard(label, value, detail) {
    return `
      <div class="col-sm-6 col-xl-3">
        <div class="border rounded p-3 h-100">
          <div class="text-secondary">${label}</div>
          <div class="fs-3">${value}</div>
          <div class="small text-secondary">${detail}</div>
        </div>
      </div>`;
  }

  function renderTable(id, columns, rows) {
    const thead = columns.map((column) => `<th scope="col">${column.label}</th>`).join("");
    const tbody = rows.map((row) => {
      const cells = columns.map((column) => `<td>${column.value(row)}</td>`).join("");
      return `<tr>${cells}</tr>`;
    }).join("");
    document.getElementById(id).innerHTML = `
      <div class="table-responsive">
        <table class="table table-sm table-striped">
          <thead><tr>${thead}</tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>`;
  }

  function branchRowsWithMedian(stats) {
    return [{
      name: "median branch",
      count: stats.branchSummary.medianCount,
      duration: stats.branchSummary.medianDuration,
    }].concat(stats.topBranches);
  }

  function renderSummary(stats) {
    const totals = stats.totals;
    const failedRate = totals.tasks === 0 ? 0 : totals.failed * 100 / totals.tasks;
    document.getElementById("summary").innerHTML = [
      summaryCard("runs", seconds.format(totals.runs), `${seconds.format(totals.tasks)} tasks`),
      summaryCard("failed tasks", seconds.format(totals.failed), `${percent.format(failedRate)}% of tasks`),
      summaryCard("median queue", formatDuration(totals.medianQueueDuration), "creation to execution"),
      summaryCard("median execution", formatDuration(totals.medianExecutionDuration), "task runtime"),
      summaryCard("wasted runner time", formatHours(totals.wastedRunnerDuration), "failed and aborted tasks"),
    ].join("");
  }

  function renderCharts(stats) {
    let runsChart;
    let tasksChart;
    let queueMedianChart;
    let queueP90Chart;
    let queueP99Chart;
    let outcomeChart;
    let wastedChart;

    function isoWeekStart(year, week) {
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4Day = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1 + (week - 1) * 7);
      return monday;
    }

    function periodDate(period, value) {
      if (period === "daily") {
        return new Date(`${value}T00:00:00Z`);
      }
      if (period === "weekly") {
        const [year, week] = value.split("-W").map(Number);
        return isoWeekStart(year, week);
      }
      return new Date(`${value}-01T00:00:00Z`);
    }

    function currentPeriod() {
      return document.querySelector("input[name='period']:checked").value;
    }

    function currentRange(rows, period) {
      const selected = document.querySelector("input[name='range']:checked").value;
      if (selected === "all" || rows.length === 0) {
        return { start: null, end: null };
      }
      if (selected === "custom") {
        const startValue = document.getElementById("range-start").value;
        const endValue = document.getElementById("range-end").value;
        return {
          start: startValue ? new Date(`${startValue}T00:00:00Z`) : null,
          end: endValue ? new Date(`${endValue}T23:59:59Z`) : null,
        };
      }

      const latest = periodDate(period, rows[rows.length - 1].period);
      return { start: subtractMonths(latest, Number(selected)), end: latest };
    }

    function datasets(period) {
      const allRows = stats.series[period];
      const range = currentRange(allRows, period);
      const rows = allRows.filter((row) => {
        const date = periodDate(period, row.period);
        return (!range.start || date >= range.start) && (!range.end || date <= range.end);
      });
      const labels = rows.map((row) => row.period);
      return { rows, labels };
    }

    function trendWindow(period) {
      return { daily: 7, weekly: 4, monthly: 3 }[period];
    }

    function trendLabel(period) {
      return { daily: "7-day average", weekly: "4-week average", monthly: "3-month average" }[period];
    }

    function rollingAverage(values, window) {
      let sum = 0;
      return values.map((value, index) => {
        sum += value;
        if (index >= window) {
          sum -= values[index - window];
        }
        return sum / Math.min(index + 1, window);
      });
    }

    function trendDataset(label, values, color, period) {
      return {
        type: "line",
        label: `${label} ${trendLabel(period)}`,
        data: rollingAverage(values, trendWindow(period)),
        borderColor: color,
        borderDash: [6, 4],
        borderWidth: 2,
        pointRadius: 0,
        fill: false,
      };
    }

    function draw(period) {
      const { rows, labels } = datasets(period);
      const runs = rows.map((row) => row.runs);
      const tasks = rows.map((row) => row.tasks);
      const medianQueueDurations = rows.map((row) => row.medianQueueDuration);
      const p90QueueDurations = rows.map((row) => row.p90QueueDuration);
      const p99QueueDurations = rows.map((row) => row.p99QueueDuration);
      const wastedRunnerHours = rows.map((row) => row.wastedRunnerDuration / 3600);
      if (runsChart) {
        runsChart.destroy();
      }
      if (tasksChart) {
        tasksChart.destroy();
      }
      if (queueMedianChart) {
        queueMedianChart.destroy();
      }
      if (queueP90Chart) {
        queueP90Chart.destroy();
      }
      if (queueP99Chart) {
        queueP99Chart.destroy();
      }
      if (outcomeChart) {
        outcomeChart.destroy();
      }
      if (wastedChart) {
        wastedChart.destroy();
      }

      runsChart = new Chart(document.getElementById("runs-chart"), {
        type: "bar",
        data: {
          labels,
          datasets: [
            { label: "runs", data: runs, backgroundColor: "#0d6efd" },
            trendDataset("runs", runs, "#084298", period),
          ],
        },
        options: {
          animation: false,
          scales: { y: { beginAtZero: true } },
          plugins: { title: { display: true, text: "CI runs" } },
        },
      });

      tasksChart = new Chart(document.getElementById("tasks-chart"), {
        type: "bar",
        data: {
          labels,
          datasets: [
            { label: "tasks", data: tasks, backgroundColor: "#6c757d" },
            trendDataset("tasks", tasks, "#343a40", period),
          ],
        },
        options: {
          animation: false,
          scales: { y: { beginAtZero: true } },
          plugins: { title: { display: true, text: "CI tasks" } },
        },
      });

      queueMedianChart = new Chart(document.getElementById("queue-median-chart"), {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "median queue", data: medianQueueDurations, borderColor: "#0d6efd" },
            trendDataset("median queue", medianQueueDurations, "#084298", period),
          ],
        },
        options: {
          animation: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: (value) => formatDuration(value) },
            },
          },
          plugins: { title: { display: true, text: "Median queue duration" } },
        },
      });

      queueP90Chart = new Chart(document.getElementById("queue-p90-chart"), {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "p90 queue", data: p90QueueDurations, borderColor: "#fd7e14" },
            trendDataset("p90 queue", p90QueueDurations, "#984c0c", period),
          ],
        },
        options: {
          animation: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: (value) => formatDuration(value) },
            },
          },
          plugins: { title: { display: true, text: "P90 queue duration" } },
        },
      });

      queueP99Chart = new Chart(document.getElementById("queue-p99-chart"), {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "p99 queue", data: p99QueueDurations, borderColor: "#dc3545" },
            trendDataset("p99 queue", p99QueueDurations, "#842029", period),
          ],
        },
        options: {
          animation: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: (value) => formatDuration(value) },
            },
          },
          plugins: { title: { display: true, text: "P99 queue duration" } },
        },
      });

      outcomeChart = new Chart(document.getElementById("outcome-chart"), {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "completed", data: rows.map((row) => outcomeRate(row, "completed")), borderColor: "#198754" },
            { label: "failed", data: rows.map((row) => outcomeRate(row, "failed")), borderColor: "#dc3545" },
            { label: "aborted", data: rows.map((row) => outcomeRate(row, "aborted")), borderColor: "#fd7e14" },
          ],
        },
        options: {
          animation: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: (value) => `${value}%` },
            },
          },
          plugins: { title: { display: true, text: "Outcome rate" } },
        },
      });

      wastedChart = new Chart(document.getElementById("wasted-chart"), {
        type: "bar",
        data: {
          labels,
          datasets: [
            { label: "runner hours", data: wastedRunnerHours, backgroundColor: "#6f42c1" },
            trendDataset("runner hours", wastedRunnerHours, "#432874", period),
          ],
        },
        options: {
          animation: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: (value) => `${value}h` },
            },
          },
          plugins: { title: { display: true, text: "Wasted runner time from failed and aborted tasks" } },
        },
      });
    }

    function syncCustomRangeInputs() {
      const custom = document.getElementById("range-custom").checked;
      document.getElementById("range-start").disabled = !custom;
      document.getElementById("range-end").disabled = !custom;
    }

    document.querySelectorAll("input[name='period']").forEach((input) => {
      input.addEventListener("change", () => draw(currentPeriod()));
    });
    document.querySelectorAll("input[name='range']").forEach((input) => {
      input.addEventListener("change", () => {
        syncCustomRangeInputs();
        draw(currentPeriod());
      });
    });
    document.getElementById("range-start").addEventListener("change", () => draw(currentPeriod()));
    document.getElementById("range-end").addEventListener("change", () => draw(currentPeriod()));

    const dailyRows = stats.series.daily;
    if (dailyRows.length > 0) {
      const latest = periodDate("daily", dailyRows[dailyRows.length - 1].period);
      document.getElementById("range-start").value = dateInputValue(subtractMonths(latest, 12));
      document.getElementById("range-end").value = dateInputValue(latest);
    }
    syncCustomRangeInputs();
    draw("daily");
  }

  fetch('{{ relURL "stats.json" }}')
    .then((response) => {
      if (!response.ok) {
        throw new Error(`HTTP error! Status: ${response.status}`);
      }
      return response.json();
    })
    .then((stats) => {
      renderSummary(stats);
      renderCharts(stats);
      renderTable("top-jobs", [
        { label: "job", value: (row) => row.name },
        { label: "tasks", value: (row) => seconds.format(row.count) },
      ], stats.topJobsByTasks);
      renderTable("failed-jobs", [
        { label: "job", value: (row) => row.name },
        { label: "failures", value: (row) => seconds.format(row.count) },
      ], stats.topJobsByFailures);
      renderTable("slowest-jobs", [
        { label: "job", value: (row) => row.name },
        { label: "median", value: (row) => formatDuration(row.medianDuration) },
        { label: "samples", value: (row) => seconds.format(row.samples) },
      ], stats.slowestJobs);
      renderTable("top-branches", [
        { label: "branch", value: (row) => row.name },
        { label: "tasks", value: (row) => seconds.format(row.count) },
        { label: "minutes", value: (row) => seconds.format(Math.round(row.duration / 60)) },
        {
          label: "vs median",
          value: (row) => stats.branchSummary.medianDuration === 0
            ? "n/a"
            : formatMultiple(row.duration / stats.branchSummary.medianDuration),
        },
      ], branchRowsWithMedian(stats));

      document.getElementById("stats-loading").classList.add("d-none");
      document.getElementById("stats").classList.remove("d-none");
    })
    .catch((error) => {
      document.getElementById("stats-loading").innerText = `Error loading stats: ${error}`;
    });
</script>

{{ end }}
